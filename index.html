<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Invaders: Final Cosmic Battle</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; }
        .hp-container {
            width: 200px; height: 12px; background: #222; border: 2px solid #fff;
            border-radius: 6px; margin-top: 5px; overflow: hidden;
        }
        #hp-bar { width: 100%; height: 100%; background: #00ff00; box-shadow: 0 0 10px #00ff00; transition: width 0.2s; }
        #stats { font-weight: bold; font-size: 18px; color: #00f2ff; text-transform: uppercase; }
        
        #warning {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 30px; color: #ff0000; font-weight: bold; text-align: center;
            display: none; z-index: 20; text-shadow: 0 0 15px #ff0000;
            animation: blink 0.4s infinite;
        }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        #boss-ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; text-align: center; display: none;
        }
        .boss-hp-bar { width: 100%; height: 12px; background: #300; border: 1px solid red; border-radius: 6px; overflow: hidden; }
        #boss-hp { width: 100%; height: 100%; background: linear-gradient(to right, #ff0000, #990000); transition: width 0.3s; }
        .boss-name { color: #ff4444; font-size: 14px; margin-bottom: 4px; letter-spacing: 3px; font-weight: bold; }

        #victory {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; z-index: 30;
        }
        #victory h1 { font-size: 40px; color: #fff; text-shadow: 0 0 20px #00f2ff; margin: 0; }
        #victory p { font-size: 18px; color: #00f2ff; }
    </style>
</head>
<body>

  <div id="start-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:flex; justify-content:center; align-items:center; flex-direction:column;">
    <h1 style="color:white;">FACE INVADERS</h1>
    <button id="start-btn" style="padding:15px 30px; font-size:20px; cursor:pointer;">TAP UNTUK MULAI</button>
  </div>

    <div id="warning">CRITICAL ALERT<br>BOSS DETECTED</div>
    <div id="victory">
        <h1>MISSION<br>ACCOMPLISHED</h1>
        <p>CONGRATULATIONS PILOT!</p>
        <button onclick="location.reload()" style="padding: 10px 20px; background: #00f2ff; border: none; border-radius: 5px; font-weight: bold;">MAIN LAGI</button>
    </div>

    <div id="ui">
        <div id="stats">SCORE: <span id="score">0</span></div>
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>

    <div id="boss-ui">
        <div class="boss-name">THE FACELESS OVERLORD</div>
        <div class="boss-hp-bar"><div id="boss-hp"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const hpBar = document.getElementById("hp-bar");
    const bossUi = document.getElementById("boss-ui");
    const bossHpBar = document.getElementById("boss-hp");
    const warningText = document.getElementById("warning");
    const victoryScreen = document.getElementById("victory");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0, health = 100, gameActive = true, bossSpawned = false;
    const player = { x: canvas.width / 2, y: canvas.height - 120, w: 70, h: 70, targetX: canvas.width / 2 };
    const playerBullets = [], enemyBullets = [], enemies = [], stars = [], particles = [];
    let boss = null;

    // Inisialisasi Bintang Background
    for(let i=0; i<80; i++) {
        stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*3 + 1 });
    }

    // Audio Engine
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playLaser() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    let musicOsc;
    function playBossTheme() {
        musicOsc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        musicOsc.type = 'sawtooth';
        musicOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        musicOsc.connect(gain); gain.connect(audioCtx.destination);
        musicOsc.start();
    }

    // Assets
    const imgPemain = new Image(); imgPemain.src = 'pemain.png';
    const imgBoss = new Image(); imgBoss.src = 'boss_pesawat.png';
    const imgPeluruMerah = new Image(); imgPeluruMerah.src = 'peluru_merah.png';
    const imgMusuhKecil = new Image(); imgMusuhKecil.src = 'musuh.png';

    function spawnEnemy() {
        if (!gameActive || bossSpawned) return;
        enemies.push({
            x: Math.random() * (canvas.width - 60), y: -60, w: 60, h: 60,
            speed: 2, hp: 40, maxHp: 40, lastShot: Date.now()
        });
        setTimeout(spawnEnemy, 1500);
    }

    function triggerBoss() {
        bossSpawned = true;
        warningText.style.display = 'block';
        playBossTheme();
        setTimeout(() => {
            warningText.style.display = 'none';
            bossUi.style.display = 'block';
            boss = {
                x: canvas.width/2 - 125, y: -250, w: 250, h: 250, targetY: 80,
                hp: 1500, maxHp: 1500, speed: 1.5, lastShot: Date.now(), attackPattern: 0
            };
        }, 3000);
    }

    canvas.addEventListener("touchmove", (e) => player.targetX = e.touches[0].clientX);
    setInterval(() => { if(gameActive) { playerBullets.push({ x: player.x, y: player.y - 30, w: 20, h: 45 }); playLaser(); } }, 280);

    function update() {
        if(!gameActive) return;
        if(score >= 500 && !bossSpawned) triggerBoss();

        // Stars Background
        stars.forEach(s => { s.y += s.speed; if(s.y > canvas.height) s.y = -5; });

        player.x += (player.targetX - player.x) * 0.2;

        playerBullets.forEach((b, i) => { b.y -= 12; if(b.y < -50) playerBullets.splice(i, 1); });

        // Peluru Musuh & Boss
        enemyBullets.forEach((eb, i) => {
            eb.x += eb.vx || 0; eb.y += eb.vy || 5;
            if(Math.abs(player.x - eb.x) < 25 && Math.abs(player.y - eb.y) < 25) {
                health -= 10;
                enemyBullets.splice(i, 1);
                if(health <= 0) gameActive = false;
            }
            if(eb.y > canvas.height) enemyBullets.splice(i, 1);
        });

        // Musuh Kecil (Nyerang Lagi)
        enemies.forEach((e, i) => {
            e.y += e.speed;
            if(Date.now() - e.lastShot > 1800) {
                enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: 0, vy: 5, color: "#00d4ff" });
                e.lastShot = Date.now();
            }
            playerBullets.forEach((b, bi) => {
                if(b.x > e.x && b.x < e.x + e.w && b.y < e.y + e.h && b.y > e.y) {
                    e.hp -= 20; playerBullets.splice(bi, 1);
                    if(e.hp <= 0) { enemies.splice(i, 1); score += 50; scoreElement.innerText = score; }
                }
            });
            if(e.y > canvas.height) enemies.splice(i, 1);
        });

        // Boss Logic (Serangan Beragam)
        if(boss) {
            if(boss.y < boss.targetY) boss.y += 1;
            boss.x += boss.speed;
            if(boss.x < 10 || boss.x > canvas.width - boss.w - 10) boss.speed *= -1;
            
            if(Date.now() - boss.lastShot > 1200) {
                boss.attackPattern = (boss.attackPattern + 1) % 3;
                
                if(boss.attackPattern === 0) { // Pattern 1: Triple Shot
                    for(let i=0; i<3; i++) enemyBullets.push({ x: boss.x + boss.w/2 + (i-1)*40, y: boss.y + boss.h, vx: 0, vy: 6, color: "red" });
                } else if(boss.attackPattern === 1) { // Pattern 2: Spread Shot (Ada celah)
                    for(let i=0; i<5; i++) { if(i === 2) continue; enemyBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: (i-2)*2.5, vy: 5, color: "#ff8800" }); }
                } else { // Pattern 3: Side Pulse
                    enemyBullets.push({ x: boss.x, y: boss.y + 100, vx: -1, vy: 5, color: "#ff00ff" });
                    enemyBullets.push({ x: boss.x + boss.w, y: boss.y + 100, vx: 1, vy: 5, color: "#ff00ff" });
                }
                boss.lastShot = Date.now();
            }

            playerBullets.forEach((b, bi) => {
                if(b.x > boss.x && b.x < boss.x + boss.w && b.y < boss.y + boss.h && b.y > boss.y) {
                    boss.hp -= 10; playerBullets.splice(bi, 1);
                    bossHpBar.style.width = (boss.hp/boss.maxHp)*100 + "%";
                    if(boss.hp <= 0) {
                        boss = null; bossUi.style.display = 'none';
                        victoryScreen.style.display = 'block';
                        if(musicOsc) musicOsc.stop();
                    }
                }
            });
        }
        hpBar.style.width = health + "%";
    }

    function draw() {
        ctx.fillStyle = "#00050a";
        ctx.fillRect(0,0, canvas.width, canvas.height);

        // Draw Stars
        ctx.fillStyle = "#fff";
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

        playerBullets.forEach(b => ctx.drawImage(imgPeluruMerah, b.x - b.w/2, b.y - b.h/2, b.w, b.h));
        ctx.drawImage(imgPemain, player.x - player.w/2, player.y - player.h/2, player.w, player.h);
        enemies.forEach(e => {
            ctx.drawImage(imgMusuhKecil, e.x, e.y, e.w, e.h);
            ctx.fillStyle = "red"; ctx.fillRect(e.x, e.y - 8, e.w * (e.hp/e.maxHp), 4);
        });

        if(boss) ctx.drawImage(imgBoss, boss.x, boss.y, boss.w, boss.h);

        enemyBullets.forEach(eb => {
            ctx.shadowBlur = 10; ctx.shadowColor = eb.color;
            ctx.fillStyle = eb.color;
            ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        update();
        if(gameActive) requestAnimationFrame(draw);
        else if(health <= 0) { alert("MISSION FAILED!"); location.reload(); }
    }

    imgMusuhKecil.onload = () => { spawnEnemy(); draw(); };
</script>
</body>
</html>
